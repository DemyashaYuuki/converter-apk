name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build APK with official Buildozer Docker image
        run: |
          mkdir -p .buildozer
          docker pull ghcr.io/kivy/buildozer:latest
          docker run --rm \
            -v "$PWD":/home/user/hostcwd \
            -v "$PWD/.buildozer":/home/user/.buildozer \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: apk
          path: bin/*.apk
